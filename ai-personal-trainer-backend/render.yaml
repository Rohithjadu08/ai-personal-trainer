services:
  - type: web
    name: ai-personal-trainer-backend
    runtime: python
    rootDir: ai-personal-trainer-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: CORS_ORIGINS
        value: "*"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        sync: false
